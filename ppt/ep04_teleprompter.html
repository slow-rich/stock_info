<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>EP04 旁白 Teleprompter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1520; color:#dde6f0; font-family:-apple-system,"PingFang TC",sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; user-select:none; }
  .header { padding:14px 32px; background:rgba(212,175,55,0.08); border-bottom:2px solid rgba(212,175,55,0.25); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .ep-label { font-size:0.8rem; color:#D4AF37; font-weight:800; letter-spacing:2px; }
  .slide-title { font-size:0.95rem; color:#94a3b8; font-weight:500; text-align:center; flex:1; padding:0 24px; }
  .counter { font-size:0.82rem; color:#475569; font-weight:600; min-width:48px; text-align:right; }
  .content { flex:1; overflow-y:auto; padding:52px 80px 40px; scroll-behavior:smooth; }
  .narration { max-width:860px; margin:0 auto; font-size:1.55rem; line-height:2.0; color:#e2eaf5; }
  .narration p { margin-bottom:1.1em; }
  .narration p:last-child { margin-bottom:0; }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .slide-anim { animation:slideIn 0.28s ease; }
  .content::-webkit-scrollbar { width:5px; }
  .content::-webkit-scrollbar-track { background:transparent; }
  .content::-webkit-scrollbar-thumb { background:rgba(212,175,55,0.2); border-radius:3px; }
  .footer { padding:12px 32px; background:rgba(0,0,0,0.35); border-top:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; gap:20px; flex-shrink:0; }
  .nav-hint { font-size:0.72rem; color:#334155; white-space:nowrap; }
  .progress-bar { flex:1; height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#D4AF37,#f0d060); border-radius:2px; transition:width 0.35s ease; }
  .btn-row { display:flex; gap:8px; }
  .btn { background:rgba(212,175,55,0.12); border:1px solid rgba(212,175,55,0.25); color:#D4AF37; border-radius:6px; padding:4px 14px; font-size:0.75rem; cursor:pointer; font-family:inherit; }
  .btn:hover { background:rgba(212,175,55,0.22); }
</style>
</head>
<body>
<div class="header">
  <span class="ep-label">EP.04</span>
  <span class="slide-title" id="slideTitle">—</span>
  <span class="counter" id="counter">1 / 11</span>
</div>
<div class="content" id="content">
  <div class="narration slide-anim" id="narration"></div>
</div>
<div class="footer">
  <div class="btn-row">
    <button class="btn" onclick="prev()">← 上一頁</button>
    <button class="btn" onclick="next()">下一頁 →</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <span class="nav-hint">← → Space 換頁 &nbsp;|&nbsp; 滾輪捲動</span>
</div>
<script>
const slides = [
  { title:'第 1 頁 — 封面', text:[
    '大家好，我是科技宅爸。',
    '這集我們要來聊一個很多人誤解的觀念——「預期報酬率」。',
    '你可能聽過，長期投資台股或 S&P 500，年化報酬率大概有 8 到 12%。聽起來很不錯，對吧？但你有沒有想過，這 8 到 12% 是怎麼來的？它代表的是每一年都差不多賺這樣嗎？',
    '這集我們就用真實數據，把這件事講清楚。',
  ]},
  { title:'第 2 頁 — 台股年度報酬率（2004–2026）', text:[
    '我先給你看台股的歷史。',
    '這張圖是台灣官方「發行量加權股價報酬指數」，包含股利再投入，從 2004 年到現在，每一年的實際報酬率。',
    '你看到了什麼？',
    '2008 年，跌了 43%。2009 年，漲了 83%。2011 年跌 18%，2022 年跌 19%，接著 2023、2024 連續兩年都漲超過 31%。',
    '23 年裡，真正落在「8 到 12%」這個所謂「預期報酬」範圍的年份，只有 2 年——2005 和 2014 年。',
    '大家都說長期年化 8 到 12%，但每一年幾乎從來不是這個數字。不是大漲，就是大跌。',
    '只有台股是這樣嗎？',
  ]},
  { title:'第 3 頁 — SPY 年度報酬率（2004–2026）', text:[
    '美國 S&P 500 也一樣。這裡的數據是 SPY 的 Adj Close，也就是含股利再投入的真實報酬。',
    '2008 年跌了 37%，2009 年漲 26%，2013 年漲 32%，2019 年漲 31%，2022 年跌 18%，2024 年又漲 25%。',
    '23 年裡，8 到 12% 這個區間只出現過 3 次（2004、2016、2026*）。',
    '長期平均大約是 10 到 13%，但你看，每一年都是在這條均值上下大幅震盪。',
    '那全球股票VT，也是這樣嗎？',
  ]},
  { title:'第 4 頁 — VT 年度報酬率（2009–2026）', text:[
    'VT 是全球股市，分散了 47 個國家、一萬多檔股票，數據使用 Adj Close 含股利再投入。',
    '和台股、S&P 500 相比，VT 的波動相對小一些。2022 年最大的跌幅是 -18%，比台股和 SPY 都小。',
    '這就是全球分散的效果——不是說不跌，而是下跌的幅度更可控。',
    '18 年中，8 到 12% 這個範圍只出現過 2 次（2016、2026*）。',
  ]},
  { title:'第 5 頁 — VT 延伸年度報酬率（2004–2026，含代理數據）', text:[
    '剛才看的 VT 數據，只有 2009 年到現在，因為 VT 這檔 ETF 是 2008 年才成立的。',
    '但 2008 年金融海嘯剛好是最重要的壓力測試。所以我們補進了 2004 到 2008 年的代理數據——用 VTSMX 和 VGTSX 按照 VT 的持股比例混合，大概是美國 58%、國際市場 42%，含股利再投入。',
    '這樣就有了完整的 23 年數據，也把 2008 金融海嘯放進來了。',
    '結果是：2008 年，全球股市跌了將近 40%。',
    '你剛才看 VT 從 2009 年開始，2022 年最大跌幅是 -18%，感覺尚可。但一旦把 2008 年放進來，差距就出來了——同樣是全球分散，2008 年還是跌了 39.6%。',
    '23 年裡，落在 8 到 12% 範圍的只有 4 次，有 5 年是負報酬。這才是更完整的 VT 樣貌。',
  ]},
  { title:'第 6 頁 — 三大市場比較', text:[
    '我幫大家整理一下這三個市場的差異。',
    '台股，波動最大，標準差約 28.1%，歷史最大跌幅曾達 -53%（1990 年泡沫）。',
    'SPY，波動中等，標準差約 17.4%。因為成分股多是跨國企業，風險相對分散。',
    'VT，全球分散，標準差約 13.6%（以 2004–2026 同期估算）。',
    '這裡有一個很重要的道理：報酬高的市場，波動也大；波動小的市場，報酬通常也低。沒有一個市場是又高報酬又低風險的。',
  ]},
  { title:'第 7 頁 — 滾動報酬率分析：台股（1993–2026）', text:[
    '剛才看的是單年度的漲跌。那如果我們把時間拉長，一次看 5 年、10 年、15 年——結果會怎樣？',
    '這就是「滾動報酬率」在做的事：把歷史切成無數個重疊的區間，看看不管你哪一年進場，持有這段時間後的結果是什麼。',
    '我們用台股從 1993 年到現在的完整數據來驗證，包含 2000 到 2002 年科技泡沫。',
    '如果你隨機選一個時間點買入台股：',
    '持有 5 年：年化最差虧損 9.2%，有 5 次負報酬。',
    '持有 10 年：年化最差虧損 5.2%，有 3 次負報酬。',
    '持有 15 年：從未虧損，年化最差 +1.5%，最好 +16.9%。',
    '持有 20 年：從未虧損，年化 +2.6% 到 +12.9%。',
    '台股要持有 15 年以上，才能確保在歷史上從未虧損。',
  ]},
  { title:'第 8 頁 — 滾動報酬率分析：S&P 500（1993–2026）', text:[
    'S&P 500 含股利再投入，1993 年到現在。這份數據包含 2000 到 2002 年科技泡沫。',
    '持有 1 年，可能 -37% 到 +37%，波動很大。',
    '持有 10 年：最差 -1.5%，仍有極少數負報酬。美國市場也不是持有 10 年就一定安全。',
    '持有 15 年：歷史上從未虧損，+3.9% 到 +14.5%。',
    '持有 20 年：+5.3% 到 +10.6%，極為穩定。',
    '美國市場的規律非常明確：給市場 15 年以上，幾乎一定會給你正報酬。',
  ]},
  { title:'第 9 頁 — 滾動報酬率分析：VT 全球（1993–2026）', text:[
    'VT 全球的數據，我用 VTSMX 和 VGTSX 按照 VT 的持股比例拼接出 1993 年以來的代理數據，涵蓋 2000–2002 年網路泡沫和 2008 年金融海嘯，全都算進去了。',
    '持有 3 年：最差曾虧損 15.3%，有 6 次負報酬。',
    '持有 5 年：最差虧損約 1.7%，有 4 次負報酬。',
    '持有 10 年：從未虧損，最差 +0.6%，最好 +12.1%。',
    '持有 15 年以上：從來沒有出現過負報酬，+3.7% 到 +11.1%。',
    '台股、SPY、VT——三個市場，同樣的結論：持有 15 年以上，是歷史驗證過最穩健的門檻。',
  ]},
  { title:'第 10 頁 — 越分散，波動越小', text:[
    '看完三個市場的滾動報酬數據，讓我們統整一個問題：持有的股票越分散，波動真的會越小嗎？',
    '用同一段時間——1993 到 2026 年——來比較三個市場的年化標準差。',
    '台股加權指數，標準差 28.1%——波動最大，是單一市場集中的結果。',
    'S&P 500，標準差 17.4%。',
    'VT，標準差 17.5%——和 SPY 幾乎相同。',
    '這個結果說明了：用相同的歷史期間比較，SPY 和 VT 的波動幾乎一樣。分散的效果，主要體現在「不依賴單一市場」，而不是大幅壓低整體波動幅度。台股的波動則明顯高於這兩者——那才是真正的集中風險。',
    '能撐過那段波動繼續持有的人，往往就是最後拿到好報酬的人。',
  ]},
  { title:'第 11 頁 — 龐氏騙局警示', text:[
    '最後，講一個真實案例。',
    '你現在已經知道：真實的市場有大漲、有大跌，年年都不一樣。這才是正常的投資。',
    '那如果有人告訴你：「我們的策略，不管市場漲跌，每年都可以給你 10 到 12% 的穩定報酬，從來不受市場波動影響」——你應該怎麼想？',
    '這正是美國史上最大金融詐騙案，馬多夫案的核心手法。他以一個叫「Split-strike conversion」的策略為名，號稱幾十年來從未虧損，吸引了無數機構和個人投資者。最終被揭穿，損失約 650 億美元。',
    '我想留給你一句話：波動，是真實投資的一部分。一個沒有波動的高報酬，只有一種可能——它是假的。',
    '如果有人「保證」你每年固定報酬，那就是龐氏騙局最典型的特徵，這種時候，走開就對了。',
    '感謝大家看到這裡。這集的重點：8 到 12% 是長期平均，不是每年保證。波動是正常的，時間才是你真正的武器。三個市場都告訴我們同一件事：持有 15 年以上，歷史上從未虧損。下一集見。',
  ]},
];

let current = 0;
function render(animate=true) {
  const slide = slides[current], total = slides.length;
  document.getElementById('slideTitle').textContent = slide.title;
  document.getElementById('counter').textContent = `${current+1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((current+1)/total)*100}%`;
  const el = document.getElementById('narration');
  el.innerHTML = slide.text.map(t=>`<p>${t}</p>`).join('');
  document.getElementById('content').scrollTop = 0;
  if (animate) { el.classList.remove('slide-anim'); void el.offsetWidth; el.classList.add('slide-anim'); }
}
function next() { if (current < slides.length-1) { current++; render(); _bc.postMessage({ slide: current }); } }
function prev() { if (current > 0) { current--; render(); _bc.postMessage({ slide: current }); } }
document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown',' '].includes(e.key)) { e.preventDefault(); next(); }
  else if (['ArrowLeft','ArrowUp'].includes(e.key)) { e.preventDefault(); prev(); }
});
const _bc = new BroadcastChannel('ep04_sync');
_bc.onmessage = e => { const i = e.data.slide; if (i >= 0 && i < slides.length && i !== current) { current = i; render(); } };
render(false);
</script>
</body>
</html>
