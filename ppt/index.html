  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .logo-text {
      line-height: 1.15;
    }
    .logo-zh {
      font-size: 22px;
      font-weight: 300;
      color: #D4AF37;
      letter-spacing: 1px;
    }
    .logo-en {
      font-size: 9px;
      color: #888;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .page-title {
      font-size: 15px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    .grid {
      max-width: 780px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .ep-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 22px 20px;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, transform 0.15s;
    }
    .ep-card:hover {
      border-color: #D4AF37;
      transform: translateY(-2px);
    }
    .ep-num {
      font-size: 11px;
      font-weight: 700;
      color: #D4AF37;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    .ep-title {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .ep-arrow {
      font-size: 13px;
      color: #475569;
      margin-top: 14px;
    }
    .ep-card:hover .ep-arrow {
      color: #D4AF37;
    }

    .footer {
      text-align: center;
      margin-top: 52px;
      font-size: 12px;
      color: #475569;
    }
    .footer a {
      color: #64748b;
      text-decoration: none;
    }
    .footer a:hover { color: #D4AF37; }
  </style>
</head>
